<html>

<head>
    <script src="//ej2.syncfusion.com/javascript/demos/grid/local-data/datasource.js" type="text/javascript"></script>
    <link href="https://cdn.syncfusion.com/ej2/33.1.47/tailwind3.css" rel="stylesheet" />
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.syncfusion.com/ej2/syncfusion-helper.js"></script>

    <style>
        body {
            touch-action: none;
        }

        .e-toolbar {
            height: 50px !important;
        }
    </style>
</head>

<body>
    <style type="text/css" class="cssStyles">
        .control-section,
        .property-section {
            margin-top: 40px;
        }

    .radio-control-section .row {
        margin: 20px 0;
    }

    .e-bigger .radio-control h4 {
        font-size: 20px;
    }
    </style>
    <!-- <h3 style="text-align: center;"><b>Support vh height</b></h3> -->
    <div class="col-lg-10 control-section">
        <div id="Grid">
        </div>
    </div>
    <div class="col-lg-2 property-section">
        <table id="property" title="Properties" style="width: 100%">
            <tr>
                <td style="padding-bottom: 10px">
                    <div class="col-md-4">
                        Height
                    </div>
                </td>
                <td style="padding-bottom: 10px">
                    <div>
                        <input type="text" tabindex="0" id='height' />
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding-bottom: 10px">
                    <div class="col-md-4">
                        Width
                    </div>
                </td>
                <td style="padding-bottom: 10px">
                    <div>
                        <input type="text" tabindex="0" id='width' />
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding-bottom: 10px">
                    <div class="col-md-4">
                        Default/ Paging/ Virtual/ Infinite
                    </div>
                </td>
                <td style="padding-bottom: 10px">
                    <div class="radio-control-section">
                        <div class="radio-control">
                            <div class="row">
                                <input id="default" type="radio">
                            </div>
                            <div class="row">
                                <input id="paging" type="radio">
                            </div>
                            <div class="row">
                                <input id="virtual" type="radio">
                            </div>
                            <div class="row">
                                <input id="infinite" type="radio">
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding-bottom: 10px">
                    <div class="col-md-4">
                        Filtering
                    </div>
                </td>
                <td style="padding-bottom: 10px">
                    <div>
                        <input type="checkbox" tabindex="0" id='filter' />
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding-bottom: 10px">
                    <div class="col-md-4">
                        Grouping
                    </div>
                </td>
                <td style="padding-bottom: 10px">
                    <div>
                        <input type="checkbox" tabindex="0" id='group' />
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <script src="ej2.min.js" type="text/javascript"></script>
    <script src="index.js" type="text/javascript"></script>
</body>

</html>
